name: Automated PR Review Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  compile:
    name: Compile Java Sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compile all Java files
        run: |
          mkdir -p out
          javac -d out *.java
          echo "Compilation successful"

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download JUnit 5
        run: |
          mkdir -p lib
          curl -sL https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar -o lib/junit.jar
      - name: Compile sources and tests
        run: |
          mkdir -p out
          javac -cp lib/junit.jar -d out *.java test/BookstoreTest.java
      - name: Run tests
        run: |
          java -jar lib/junit.jar --class-path out --scan-class-path --fail-if-no-tests --reports-dir=test-results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  oop-validation:
    name: OOP Structure Validation
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Validate OOP requirements
        run: |
          ERRORS=0

          if grep -q "abstract class Service" Service.java; then
            echo "OK Abstract class Service found"
          else
            echo "FAIL Abstract class Service not found"
            ERRORS=$((ERRORS + 1))
          fi

          for class in Read Buy Rent; do
            if grep -q "class $class extends Service" ${class}.java; then
              echo "OK $class extends Service"
            else
              echo "FAIL $class does not extend Service"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if grep -rl "@Override" *.java | grep -qv "Bookstore.java"; then
            echo "OK @Override found"
          else
            echo "FAIL No @Override annotations found"
            ERRORS=$((ERRORS + 1))
          fi

          OVERLOAD_COUNT=$(grep -c "void displayInfo" BOOK.java 2>/dev/null || grep -c "void displayInfo" Book.java 2>/dev/null || echo 0)
          if [ "$OVERLOAD_COUNT" -ge 2 ]; then
            echo "OK Method overloading found"
          else
            echo "FAIL Method overloading not found in Book.java"
            ERRORS=$((ERRORS + 1))
          fi

          if grep -q "Service service" Bookstore.java; then
            echo "OK Superclass reference found"
          else
            echo "FAIL Superclass reference not found"
            ERRORS=$((ERRORS + 1))
          fi

          if grep -q "u\.getPassword()" AccountManager.java 2>/dev/null; then
            echo "FAIL getPassword() exposed - encapsulation violation"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK Password encapsulation good"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "OOP validation failed: $ERRORS issues found"
            exit 1
          else
            echo "All OOP checks passed"
          fi

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [compile, test, oop-validation]
    if: always()
    steps:
      - name: Print result
        run: |
          echo "================================"
          echo "  BOOKSTORE PR REVIEW SUMMARY"
          echo "================================"
          echo "Compile      : ${{ needs.compile.result }}"
          echo "Tests        : ${{ needs.test.result }}"
          echo "OOP Validation: ${{ needs.oop-validation.result }}"
          echo "================================"
          if [[ "${{ needs.compile.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.oop-validation.result }}" != "success" ]]; then
            echo "FAILED - fix issues before merging"
            exit 1
          fi
          echo "All checks passed"
